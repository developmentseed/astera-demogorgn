name: Basin Update — Partial Icechunk Write

on:
  push:
    branches: [main]
    paths:
      - "updates/**/*.yaml"

  workflow_dispatch:
    inputs:
      manifest_files:
        description: "Space-separated repo-relative paths to manifest YAML files (e.g. updates/jakobshavn-2025-04.yaml)"
        required: true
      dry_run:
        description: "Validate manifests without writing to the store"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  update:
    name: Apply basin update(s)
    runs-on: ubuntu-latest

    env:
      STORE_S3_PATH:           "s3://us-west-2.opendata.source.coop/<org>/astera/realizations.icechunk"
      DRY_RUN:                 ${{ github.event.inputs.dry_run || 'false' }}
      GIT_SHA:                 ${{ github.sha }}
      # Source Cooperative S3-compatible credentials.
      # Obtain from your product page → View Credentials, then store as repo secrets.
      AWS_ACCESS_KEY_ID:       ${{ secrets.SOURCE_COOP_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:   ${{ secrets.SOURCE_COOP_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:       ${{ secrets.SOURCE_COOP_SESSION_TOKEN }}
      AWS_DEFAULT_REGION:      us-west-2

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Fetch two commits so we can diff for changed manifests on push
          fetch-depth: 2
          persist-credentials: false

      - name: Resolve manifest files
        id: manifests
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Use the explicitly supplied list
            echo "files=${GITHUB_EVENT_INPUTS_MANIFEST_FILES}" >> "$GITHUB_OUTPUT"
          else
            # Detect YAML files added or modified in this push
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'updates/*.yaml' 'updates/**/*.yaml' | tr '\n' ' ')
            if [[ -z "${CHANGED// }" ]]; then
              echo "No manifest files changed — nothing to do."
              echo "files=" >> "$GITHUB_OUTPUT"
            else
              echo "Changed manifests: $CHANGED"
              echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
            fi
          fi
        env:
          GITHUB_EVENT_INPUTS_MANIFEST_FILES: ${{ github.event.inputs.manifest_files }}

      - name: Set up uv
        if: steps.manifests.outputs.files != ''
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install dependencies
        if: steps.manifests.outputs.files != ''
        run: uv sync --extra ci

      - name: Apply basin update(s)
        if: steps.manifests.outputs.files != ''
        env:
          MANIFEST_FILES: ${{ steps.manifests.outputs.files }}
        run: uv run python scripts/basin_update.py

      - name: Upload result summary
        if: always() && steps.manifests.outputs.files != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: update-result-${{ github.run_id }}
          path: /tmp/update_result.txt
          if-no-files-found: ignore
