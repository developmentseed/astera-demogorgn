# Basin update manifest
# Commit this file (or any updates/*.yaml) to main to trigger the basin-update workflow.
# The workflow detects which YAML files changed in the push and passes them to basin_update.py.

basin: jakobshavn                  # human-readable identifier used in the Icechunk commit message

date: "2025-04"                    # model run date/label; included in commit message

# S3 path to the basin raster mask (.npy, shape (y, x), dtype bool / 0-1 int)
# Must match the realizations grid: EPSG:3031, 500 m step, ±3.333 M extent → (13334, 13334)
mask_s3_path: "s3://us-west-2.opendata.source.coop/<org>/astera/masks/jakobshavn.npy"

# S3 path to the new model output for this basin (.npy, shape (n_realizations, bbox_h, bbox_w), float32)
# bbox dimensions must match the bounding box of the mask above
data_s3_path: "s3://us-west-2.opendata.source.coop/<org>/astera/model-output/jakobshavn/2025-04/data.npy"
