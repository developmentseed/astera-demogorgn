<svg xmlns="http://www.w3.org/2000/svg" width="580" height="320" viewBox="0 0 580 320">
  <style>
    text { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; }
    .title { font-size: 13px; font-weight: 600; fill: #1a1a2e; }
    .label { font-size: 11px; fill: #555; }
    .dim { font-size: 11px; fill: #333; font-weight: 600; }
    .info { font-size: 11px; fill: #666; }
    .info-val { font-size: 11px; fill: #333; font-weight: 500; }
  </style>

  <!-- Title -->
  <text x="20" y="24" class="title">Basin Update (partial write)</text>

  <!-- 3D cube: top face -->
  <polygon points="80,60 280,60 320,44 120,44" fill="#D9D9D9" stroke="#A6A6A6" stroke-width="1.5"/>
  <!-- 3D cube: front face (grey, unchanged) -->
  <polygon points="80,60 280,60 280,200 80,200" fill="#E8E8E8" stroke="#A6A6A6" stroke-width="1.5"/>
  <!-- 3D cube: right face -->
  <polygon points="280,60 320,44 320,184 280,200" fill="#CBCBCB" stroke="#A6A6A6" stroke-width="1.5"/>

  <!-- Updated basin region (highlighted on front face) -->
  <rect x="170" y="90" width="60" height="50" fill="#F4B183" stroke="#ED7D31" stroke-width="2" rx="2"/>
  <!-- Updated region on top face -->
  <polygon points="170,90 230,90 238,86 178,86" fill="#F8C9A0" stroke="#ED7D31" stroke-width="1.5"/>
  <!-- Updated region on right face -->
  <polygon points="230,90 238,86 238,126 230,140" fill="#E8A06A" stroke="#ED7D31" stroke-width="1.5"/>

  <!-- Basin label -->
  <text x="200" y="118" text-anchor="middle" font-size="9" fill="#7B3B00" font-weight="600" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">basin</text>

  <!-- Dimension arrows and labels -->
  <line x1="80" y1="220" x2="280" y2="220" stroke="#333" stroke-width="1.2" marker-end="url(#arrow3)"/>
  <text x="160" y="240" class="dim" text-anchor="middle">x: 13,334</text>

  <line x1="60" y1="200" x2="60" y2="60" stroke="#333" stroke-width="1.2" marker-end="url(#arrow3)"/>
  <text x="40" y="136" class="dim" text-anchor="middle" transform="rotate(-90,40,136)">y: 13,334</text>

  <line x1="284" y1="56" x2="316" y2="44" stroke="#333" stroke-width="1.2" marker-end="url(#arrow3)"/>
  <text x="330" y="42" class="dim">i: 100</text>
  <text x="330" y="56" class="label">realizations</text>

  <!-- Subset callout arrows -->
  <line x1="170" y1="145" x2="150" y2="170" stroke="#ED7D31" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="230" y1="145" x2="250" y2="170" stroke="#ED7D31" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Subset detail box -->
  <rect x="120" y="172" width="160" height="50" rx="4" fill="#FFF2E5" stroke="#ED7D31" stroke-width="1"/>
  <text x="200" y="190" text-anchor="middle" font-size="10" fill="#7B3B00" font-weight="600" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">arr[:, row_sl, col_sl]</text>
  <text x="200" y="206" text-anchor="middle" font-size="10" fill="#7B3B00" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">= new_data (100, h, w)</text>

  <!-- Info panel -->
  <rect x="370" y="60" width="195" height="145" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="385" y="82" class="info">Mask</text>
  <text x="470" y="82" class="info-val">(13334, 13334) bool</text>
  <text x="385" y="100" class="info">Data</text>
  <text x="470" y="100" class="info-val">(100, bbox_h, bbox_w)</text>
  <text x="385" y="118" class="info">Write region</text>
  <text x="470" y="118" class="info-val">mask bounding box</text>
  <text x="385" y="136" class="info">Unchanged</text>
  <text x="470" y="136" class="info-val">rest of cube (grey)</text>
  <text x="385" y="160" class="info">Versioning</text>
  <text x="470" y="160" class="info-val">Icechunk snapshot</text>
  <text x="385" y="178" class="info">Commit msg</text>
  <text x="470" y="178" class="info-val">"{basin} {date}"</text>
  <text x="385" y="196" class="info">Trigger</text>
  <text x="470" y="196" class="info-val">push YAML to updates/</text>

  <defs>
    <marker id="arrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#333" stroke-width="1"/>
    </marker>
  </defs>
</svg>
