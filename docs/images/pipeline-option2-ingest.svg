<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380">
  <style>
    text { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; }
    .env-label { font-size: 14px; font-weight: 700; }
    .env-sub { font-size: 10px; fill: #666; }
    .step-bold { font-size: 11px; fill: #333; font-weight: 600; }
    .detail { font-size: 10px; fill: #666; }
    .dim { font-size: 10px; fill: #555; font-weight: 600; }
    .arrow-label { font-size: 10px; fill: #555; font-style: italic; }
  </style>
  <defs>
    <marker id="a1-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#5B9BD5" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Swim lane backgrounds -->
  <rect x="0" y="0" width="480" height="380" fill="#F0F4F8"/>
  <rect x="480" y="0" width="480" height="380" fill="#FDF6EE"/>
  <line x1="480" y1="0" x2="480" y2="380" stroke="#ddd" stroke-width="1"/>

  <!-- Lane headers -->
  <rect x="0" y="0" width="480" height="50" fill="#D6E4F0"/>
  <text x="240" y="22" text-anchor="middle" class="env-label" fill="#2B5797">HPC</text>
  <text x="240" y="38" text-anchor="middle" class="env-sub">Scientists run scripts directly, no CI/CD</text>

  <rect x="480" y="0" width="480" height="50" fill="#F5E6D0"/>
  <text x="720" y="22" text-anchor="middle" class="env-label" fill="#8B5E3C">Source.Coop</text>
  <text x="720" y="38" text-anchor="middle" class="env-sub">S3-compatible object storage</text>

  <!-- Title -->
  <text x="480" y="78" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">Option 2: Initial Ingest (direct from HPC)</text>

  <!-- Step 1: Run model -->
  <rect x="30" y="100" width="430" height="42" rx="8" fill="#fff" stroke="#5B9BD5" stroke-width="1.5"/>
  <text x="46" y="118" class="step-bold" fill="#2B5797">1</text>
  <circle cx="46" cy="114" r="10" fill="none" stroke="#5B9BD5" stroke-width="1.2"/>
  <text x="64" y="120" class="step-bold">Run ice-sheet model</text>
  <text x="40" y="136" class="detail">Generate 100 stochastic residual fields (.npy)</text>

  <line x1="245" y1="142" x2="245" y2="158" stroke="#5B9BD5" stroke-width="1.5" marker-end="url(#a1-blue)"/>

  <!-- Step 2: Postprocess -->
  <rect x="30" y="160" width="430" height="68" rx="8" fill="#fff" stroke="#5B9BD5" stroke-width="1.5"/>
  <text x="46" y="178" class="step-bold" fill="#2B5797">2</text>
  <circle cx="46" cy="174" r="10" fill="none" stroke="#5B9BD5" stroke-width="1.2"/>
  <text x="64" y="180" class="step-bold">Postprocess realizations</text>
  <text x="40" y="196" class="detail">Add trend back to residual, apply Bedmap3 mask:</text>
  <text x="40" y="210" class="detail">keep simulated values where ice/rock, else use Bedmap3 bed</text>
  <text x="40" y="224" class="detail">Output: realizations.nc (float32)</text>

  <line x1="245" y1="228" x2="245" y2="244" stroke="#5B9BD5" stroke-width="1.5" marker-end="url(#a1-blue)"/>

  <!-- Step 3: Run ingest script -->
  <rect x="30" y="246" width="430" height="55" rx="8" fill="#fff" stroke="#5B9BD5" stroke-width="1.5"/>
  <text x="46" y="266" class="step-bold" fill="#2B5797">3</text>
  <circle cx="46" cy="262" r="10" fill="none" stroke="#5B9BD5" stroke-width="1.2"/>
  <text x="64" y="268" class="step-bold">Run ingest script</text>
  <text x="40" y="284" class="detail">uv run python scripts/local_ingest.py /data/realizations.nc</text>
  <text x="40" y="296" class="detail">Reads local NetCDF, streams batches directly to Icechunk</text>

  <!-- Arrow: ingest → Source.Coop -->
  <path d="M460,270 L500,270" fill="none" stroke="#5B9BD5" stroke-width="1.5" marker-end="url(#a1-blue)"/>
  <text x="465" y="262" class="arrow-label">write</text>

  <!-- Source.Coop: Icechunk created -->
  <rect x="500" y="130" width="440" height="170" rx="8" fill="#fff" stroke="#D4915E" stroke-width="1.5"/>
  <polygon points="520,160 590,160 602,153 532,153" fill="#BDD7EE" stroke="#5B9BD5" stroke-width="1"/>
  <polygon points="520,160 590,160 590,205 520,205" fill="#BDD7EE" stroke="#5B9BD5" stroke-width="1"/>
  <polygon points="590,160 602,153 602,198 590,205" fill="#9DC3E6" stroke="#5B9BD5" stroke-width="1"/>
  <line x1="543" y1="160" x2="543" y2="205" stroke="#5B9BD5" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.5"/>
  <line x1="566" y1="160" x2="566" y2="205" stroke="#5B9BD5" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.5"/>
  <line x1="520" y1="175" x2="590" y2="175" stroke="#5B9BD5" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.5"/>
  <line x1="520" y1="190" x2="590" y2="190" stroke="#5B9BD5" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.5"/>

  <text x="614" y="162" class="step-bold">realizations.icechunk</text>
  <text x="614" y="178" class="detail">(100, 13334, 13334) float32</text>
  <text x="614" y="194" class="detail">shards (100, 512, 512), zstd</text>
  <text x="614" y="210" class="detail">EPSG:3031, 500 m</text>
  <text x="510" y="240" class="dim">No source data uploaded to S3</text>
  <text x="510" y="254" class="dim">Only the Icechunk store lives on Source.Coop</text>

  <!-- Step 4: Read back -->
  <rect x="30" y="325" width="430" height="40" rx="8" fill="#fff" stroke="#5B9BD5" stroke-width="1.5"/>
  <text x="46" y="345" class="step-bold" fill="#2B5797">4</text>
  <circle cx="46" cy="341" r="10" fill="none" stroke="#5B9BD5" stroke-width="1.2"/>
  <text x="64" y="347" class="step-bold">Analyse: xr.open_zarr(session.store)</text>

  <path d="M500,290 Q460,320 460,340" fill="none" stroke="#5B9BD5" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#a1-blue)"/>
  <text x="490" y="310" class="arrow-label">read</text>
</svg>
