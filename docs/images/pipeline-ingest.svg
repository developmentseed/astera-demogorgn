<svg xmlns="http://www.w3.org/2000/svg" width="960" height="610" viewBox="0 0 960 610">
  <style>
    text { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; }
    .env-label { font-size: 14px; font-weight: 700; }
    .env-sub { font-size: 10px; fill: #666; }
    .step-bold { font-size: 11px; fill: #333; font-weight: 600; }
    .detail { font-size: 10px; fill: #666; }
    .dim { font-size: 10px; fill: #555; font-weight: 600; }
    .arrow-label { font-size: 10px; fill: #555; font-style: italic; }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#888" stroke-width="1.2"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#5B9BD5" stroke-width="1.2"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#70AD47" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- ── Swim lane backgrounds ── -->
  <rect x="0" y="0" width="280" height="610" fill="#F0F4F8"/>
  <rect x="280" y="0" width="380" height="610" fill="#FFFFFF"/>
  <rect x="660" y="0" width="300" height="610" fill="#FDF6EE"/>

  <!-- Lane dividers -->
  <line x1="280" y1="0" x2="280" y2="610" stroke="#ddd" stroke-width="1"/>
  <line x1="660" y1="0" x2="660" y2="610" stroke="#ddd" stroke-width="1"/>

  <!-- ── Lane headers ── -->
  <rect x="0" y="0" width="280" height="50" fill="#D6E4F0"/>
  <text x="140" y="22" text-anchor="middle" class="env-label" fill="#2B5797">HPC</text>
  <text x="140" y="38" text-anchor="middle" class="env-sub">Scientists' compute environment</text>

  <rect x="280" y="0" width="380" height="50" fill="#E8E8E8"/>
  <text x="470" y="22" text-anchor="middle" class="env-label" fill="#333">GitHub</text>
  <text x="470" y="38" text-anchor="middle" class="env-sub">Actions CI/CD</text>

  <rect x="660" y="0" width="300" height="50" fill="#F5E6D0"/>
  <text x="810" y="22" text-anchor="middle" class="env-label" fill="#8B5E3C">Source.Coop</text>
  <text x="810" y="38" text-anchor="middle" class="env-sub">S3-compatible object storage</text>

  <!-- ── Title ── -->
  <text x="480" y="78" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">Pipeline 1: Initial Ingest</text>

  <!-- STEP 1: HPC — run model -->
  <rect x="20" y="100" width="240" height="55" rx="8" fill="#fff" stroke="#5B9BD5" stroke-width="1.5"/>
  <text x="36" y="118" class="step-bold" fill="#2B5797">1</text>
  <circle cx="36" cy="114" r="10" fill="none" stroke="#5B9BD5" stroke-width="1.2"/>
  <text x="54" y="120" class="step-bold">Run ice-sheet model</text>
  <text x="30" y="138" class="detail">Generate 100 stochastic residual fields</text>
  <text x="30" y="150" class="detail">Output: .npy per realization (float64)</text>

  <!-- Arrow: step 1 → step 2 -->
  <line x1="140" y1="155" x2="140" y2="172" stroke="#5B9BD5" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- STEP 2: HPC — postprocess -->
  <rect x="20" y="175" width="240" height="95" rx="8" fill="#fff" stroke="#5B9BD5" stroke-width="1.5"/>
  <text x="36" y="193" class="step-bold" fill="#2B5797">2</text>
  <circle cx="36" cy="189" r="10" fill="none" stroke="#5B9BD5" stroke-width="1.2"/>
  <text x="54" y="195" class="step-bold">Postprocess realizations</text>
  <text x="30" y="213" class="detail">Load Bedmap3 (mask, trend, bed topo)</text>
  <text x="30" y="227" class="detail">Add trend back to residual</text>
  <text x="30" y="241" class="detail">Apply mask: keep simulated values</text>
  <text x="30" y="255" class="detail">where ice/rock, else use Bedmap3 bed</text>
  <text x="30" y="267" class="detail">Output: realizations.nc (float32)</text>

  <!-- Arrow: step 2 → step 3 -->
  <line x1="140" y1="270" x2="140" y2="288" stroke="#5B9BD5" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- STEP 3: HPC — upload -->
  <rect x="20" y="290" width="240" height="45" rx="8" fill="#fff" stroke="#5B9BD5" stroke-width="1.5"/>
  <text x="36" y="310" class="step-bold" fill="#2B5797">3</text>
  <circle cx="36" cy="306" r="10" fill="none" stroke="#5B9BD5" stroke-width="1.2"/>
  <text x="54" y="312" class="step-bold">Upload NetCDF to S3</text>
  <text x="30" y="328" class="detail">aws s3 cp realizations.nc s3://...</text>

  <!-- Source.Coop: NetCDF stored -->
  <rect x="680" y="175" width="260" height="60" rx="8" fill="#fff" stroke="#D4915E" stroke-width="1.5"/>
  <polygon points="700,191 750,191 760,185 710,185" fill="#E2EFDA" stroke="#70AD47" stroke-width="1"/>
  <polygon points="700,191 750,191 750,215 700,215" fill="#E2EFDA" stroke="#70AD47" stroke-width="1"/>
  <polygon points="750,191 760,185 760,209 750,215" fill="#C5E0B4" stroke="#70AD47" stroke-width="1"/>
  <text x="770" y="196" class="step-bold">realizations.nc</text>
  <text x="770" y="212" class="detail">(100, 13334, 13334) float32</text>
  <text x="770" y="226" class="detail">postprocessed, ~66 GB</text>

  <!-- Arrow: HPC upload → Source.Coop -->
  <path d="M260,313 Q470,290 680,210" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="480" y="280" class="arrow-label">aws s3 cp</text>

  <!-- STEP 4: GitHub — trigger workflow -->
  <rect x="300" y="355" width="340" height="55" rx="8" fill="#fff" stroke="#888" stroke-width="1.5"/>
  <text x="316" y="375" class="step-bold" fill="#333">4</text>
  <circle cx="316" cy="371" r="10" fill="none" stroke="#888" stroke-width="1.2"/>
  <text x="334" y="377" class="step-bold">Trigger: workflow_dispatch</text>
  <text x="310" y="395" class="detail">Input: NETCDF_S3_PATH, BATCH_SIZE</text>

  <!-- Arrow: HPC triggers GitHub -->
  <path d="M140,335 L140,375 L300,375" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="180" y="367" class="arrow-label">manual trigger</text>

  <!-- STEP 5: GitHub Actions runs ingest -->
  <rect x="300" y="430" width="340" height="80" rx="8" fill="#fff" stroke="#888" stroke-width="1.5"/>
  <text x="316" y="451" class="step-bold" fill="#333">5</text>
  <circle cx="316" cy="447" r="10" fill="none" stroke="#888" stroke-width="1.2"/>
  <text x="334" y="453" class="step-bold">initial_ingest.py</text>
  <text x="310" y="471" class="detail">16-core runner, 16 GB RAM</text>
  <text x="310" y="487" class="detail">Downloads NC, streams batches of 1 realization</text>
  <text x="310" y="501" class="detail">Writes sharded Zarr V3 to Icechunk</text>

  <!-- Arrow: step 4 → step 5 -->
  <line x1="470" y1="410" x2="470" y2="430" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow: Source.Coop NC → GitHub Actions (reads) -->
  <path d="M680,230 Q600,340 600,440" fill="none" stroke="#70AD47" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
  <text x="616" y="340" class="arrow-label">boto3 download</text>

  <!-- Source.Coop: Icechunk store created -->
  <rect x="680" y="400" width="260" height="130" rx="8" fill="#fff" stroke="#D4915E" stroke-width="1.5"/>
  <polygon points="700,430 760,430 770,424 710,424" fill="#BDD7EE" stroke="#5B9BD5" stroke-width="1"/>
  <polygon points="700,430 760,430 760,470 700,470" fill="#BDD7EE" stroke="#5B9BD5" stroke-width="1"/>
  <polygon points="760,430 770,424 770,464 760,470" fill="#9DC3E6" stroke="#5B9BD5" stroke-width="1"/>
  <line x1="720" y1="430" x2="720" y2="470" stroke="#5B9BD5" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.5"/>
  <line x1="740" y1="430" x2="740" y2="470" stroke="#5B9BD5" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.5"/>
  <line x1="700" y1="443" x2="760" y2="443" stroke="#5B9BD5" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.5"/>
  <line x1="700" y1="456" x2="760" y2="456" stroke="#5B9BD5" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.5"/>

  <text x="780" y="432" class="step-bold">realizations.icechunk</text>
  <text x="780" y="448" class="detail">(100, 13334, 13334)</text>
  <text x="780" y="462" class="detail">float32, zstd</text>
  <text x="780" y="476" class="detail">shards: (100, 512, 512)</text>
  <text x="690" y="500" class="dim">EPSG:3031 Antarctic Stereographic</text>
  <text x="690" y="514" class="dim">500 m resolution, ~6,667 km extent</text>

  <!-- Arrow: GitHub Actions → Icechunk store (writes) -->
  <path d="M640,475 L680,475" fill="none" stroke="#5B9BD5" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="642" y="490" class="arrow-label">write</text>

  <!-- STEP 6: HPC — read back -->
  <rect x="20" y="500" width="240" height="70" rx="8" fill="#fff" stroke="#5B9BD5" stroke-width="1.5"/>
  <text x="36" y="520" class="step-bold" fill="#2B5797">6</text>
  <circle cx="36" cy="516" r="10" fill="none" stroke="#5B9BD5" stroke-width="1.2"/>
  <text x="54" y="522" class="step-bold">Analyse via xarray</text>
  <text x="30" y="540" class="detail">xr.open_zarr(session.store)</text>
  <text x="30" y="554" class="detail">Windowed reads, ensemble stats,</text>
  <text x="30" y="566" class="detail">profile interpolation</text>

  <!-- Arrow: Source.Coop → HPC (reads) -->
  <path d="M680,510 Q440,560 260,535" fill="none" stroke="#5B9BD5" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <text x="440" y="558" class="arrow-label">icechunk.s3_storage → xarray</text>

  <!-- dotted line from step 3 to step 6 (waiting) -->
  <line x1="40" y1="335" x2="40" y2="500" stroke="#5B9BD5" stroke-width="1" stroke-dasharray="3,5" opacity="0.4"/>
</svg>
