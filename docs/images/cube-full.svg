<svg xmlns="http://www.w3.org/2000/svg" width="580" height="280" viewBox="0 0 580 280">
  <style>
    text { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; }
    .title { font-size: 13px; font-weight: 600; fill: #1a1a2e; }
    .label { font-size: 11px; fill: #555; }
    .dim { font-size: 11px; fill: #333; font-weight: 600; }
    .info { font-size: 11px; fill: #666; }
    .info-val { font-size: 11px; fill: #333; font-weight: 500; }
  </style>

  <!-- Title -->
  <text x="20" y="24" class="title">Full Antarctic Datacube</text>

  <!-- 3D cube: top face -->
  <polygon points="80,60 280,60 320,44 120,44" fill="#9DC3E6" stroke="#5B9BD5" stroke-width="1.5"/>
  <!-- 3D cube: front face -->
  <polygon points="80,60 280,60 280,200 80,200" fill="#BDD7EE" stroke="#5B9BD5" stroke-width="1.5"/>
  <!-- 3D cube: right face -->
  <polygon points="280,60 320,44 320,184 280,200" fill="#7BAFE2" stroke="#5B9BD5" stroke-width="1.5"/>

  <!-- Chunk grid lines on front face (vertical - x chunks) -->
  <line x1="130" y1="60" x2="130" y2="200" stroke="#5B9BD5" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="180" y1="60" x2="180" y2="200" stroke="#5B9BD5" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="230" y1="60" x2="230" y2="200" stroke="#5B9BD5" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Chunk grid lines on front face (horizontal - y chunks) -->
  <line x1="80" y1="95" x2="280" y2="95" stroke="#5B9BD5" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="80" y1="130" x2="280" y2="130" stroke="#5B9BD5" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="80" y1="165" x2="280" y2="165" stroke="#5B9BD5" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Dimension arrows and labels -->
  <!-- x axis (bottom) -->
  <line x1="80" y1="220" x2="280" y2="220" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="160" y="240" class="dim" text-anchor="middle">x: 13,334</text>
  <text x="160" y="254" class="label" text-anchor="middle">500 m resolution</text>

  <!-- y axis (left) -->
  <line x1="60" y1="200" x2="60" y2="60" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="40" y="136" class="dim" text-anchor="middle" transform="rotate(-90,40,136)">y: 13,334</text>

  <!-- realizations axis (top-right) -->
  <line x1="284" y1="56" x2="316" y2="44" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="330" y="42" class="dim">i: 100</text>
  <text x="330" y="56" class="label">realizations</text>

  <!-- Info panel -->
  <rect x="370" y="60" width="195" height="145" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="385" y="82" class="info">Shape</text>
  <text x="470" y="82" class="info-val">(100, 13334, 13334)</text>
  <text x="385" y="100" class="info">Dtype</text>
  <text x="470" y="100" class="info-val">float32</text>
  <text x="385" y="118" class="info">Size</text>
  <text x="470" y="118" class="info-val">~66 GB</text>
  <text x="385" y="136" class="info">Shards</text>
  <text x="470" y="136" class="info-val">(100, 512, 512)</text>
  <text x="385" y="154" class="info">Chunks</text>
  <text x="470" y="154" class="info-val">(100, 128, 128)</text>
  <text x="385" y="172" class="info">Compression</text>
  <text x="470" y="172" class="info-val">zstd (level 5)</text>
  <text x="385" y="190" class="info">CRS</text>
  <text x="470" y="190" class="info-val">EPSG:3031</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#333" stroke-width="1"/>
    </marker>
  </defs>
</svg>
